<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="中国省">
  <meta name="theme-color" content="#c0392b">
  <meta name="description" content="中国の省・直轄市・自治区の名前を中国語で学べるアプリ">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>中国の省 – 発音学習</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:      #faf8f3;
      --bg2:     #f0ede4;
      --bg3:     #e8e4da;
      --card:    #ffffff;
      --text:    #1a1410;
      --text2:   #6b5f52;
      --text3:   #9e9186;
      --red:     #c0392b;
      --red2:    #e74c3c;
      --gold:    #b8860b;
      --border:  rgba(26,20,16,0.10);
      --border2: rgba(26,20,16,0.18);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1410; --bg2: #231e18; --bg3: #2e271f; --card: #2a231c;
        --text: #f0e8dc; --text2: #a89880; --text3: #6e6055;
        --border: rgba(240,232,220,0.10); --border2: rgba(240,232,220,0.20);
      }
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ───── HEADER ───── */
    .header {
      background: var(--red);
      color: #fff;
      padding: 10px 14px;
      padding-top: calc(10px + var(--safe-top));
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      user-select: none;
    }
    .header-flag { font-size: 22px; line-height: 1; }
    .header-title { font-size: 18px; font-weight: 700; font-family: 'Noto Serif SC', serif; letter-spacing: 0.06em; flex: 1; }
    .header-sub { font-size: 10px; opacity: 0.8; margin-top: 1px; letter-spacing: 0.03em; }
    .header-back {
      background: rgba(255,255,255,0.22);
      border: none; color: #fff;
      width: 34px; height: 34px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .header-back:active { background: rgba(255,255,255,0.38); }

    /* ───── LIST VIEW ───── */
    #list-view {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 8px calc(8px + var(--safe-bot));
    }
    .province-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .prov-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 3px 8px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.12s, background 0.12s;
      display: flex; flex-direction: column;
      align-items: center; gap: 2px;
      touch-action: manipulation;
    }
    .prov-btn:active { transform: scale(0.94); background: var(--red); border-color: var(--red); }
    .prov-btn:active .pn, .prov-btn:active .pp { color: #fff !important; }
    .pn { font-size: 13px; font-family: 'Noto Serif SC', serif; color: var(--text); font-weight: 600; line-height: 1.2; }
    .pp { font-size: 8px; color: var(--text3); line-height: 1.3; }

    /* ───── DETAIL VIEW ───── */
    #detail-view {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: none;
    }

    .map-area {
      background: var(--bg2);
      padding: 12px 12px 8px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .china-map-wrap { flex: 1; min-width: 0; }
    #china-map { width: 100%; height: auto; border-radius: 8px; display: block; }
    .shape-wrap {
      width: 95px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    #province-shape { width: 100%; height: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--card); display: block; }
    .map-lbl { font-size: 9px; color: var(--text3); text-align: center; }

    .detail-body { padding: 14px 14px 6px; }

    .name-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .d-name { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .d-type { font-size: 10px; color: var(--text3); background: var(--bg2); border-radius: 20px; padding: 2px 8px; align-self: center; white-space: nowrap; }
    .d-py { font-size: 15px; color: var(--text2); margin-top: 3px; letter-spacing: 0.02em; }

    .cap-block {
      margin-top: 12px;
      background: var(--bg2);
      border-radius: 10px;
      padding: 11px 13px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cap-icon { font-size: 20px; flex-shrink: 0; }
    .cap-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
    .cap-name { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 600; line-height: 1.2; }
    .cap-py { font-size: 12px; color: var(--text2); margin-top: 1px; }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .stat-card { background: var(--bg2); border-radius: 10px; padding: 10px 12px; }
    .stat-lbl { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
    .stat-rank { font-size: 22px; font-weight: 700; color: var(--red); line-height: 1; }
    .stat-val { font-size: 10px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
    .rank-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 7px; overflow: hidden; }
    .rank-fill { height: 100%; background: var(--red); border-radius: 2px; width: 0; transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }

    /* ───── ACTIONS ───── */
    .actions {
      display: flex;
      gap: 8px;
      padding: 12px 14px calc(12px + var(--safe-bot));
    }
    .btn-speak {
      flex: 1;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 11px;
      padding: 13px 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
      touch-action: manipulation;
    }
    .btn-speak:active { opacity: 0.78; transform: scale(0.97); }
    .btn-nav {
      background: var(--card);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 11px;
      padding: 13px 13px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .btn-nav:active { background: var(--bg3); transform: scale(0.96); }

    /* sound wave */
    .sound-wave { display: flex; align-items: center; gap: 2.5px; height: 18px; }
    .sound-wave span { display: block; width: 3px; background: #fff; border-radius: 2px; }
    .sound-wave span:nth-child(1) { height: 5px; }
    .sound-wave span:nth-child(2) { height: 11px; }
    .sound-wave span:nth-child(3) { height: 16px; }
    .sound-wave span:nth-child(4) { height: 9px; }
    .sound-wave span:nth-child(5) { height: 5px; }
    .speaking .sound-wave span { animation: wv 0.75s ease-in-out infinite; }
    .speaking .sound-wave span:nth-child(1) { animation-delay: 0s; }
    .speaking .sound-wave span:nth-child(2) { animation-delay: 0.12s; }
    .speaking .sound-wave span:nth-child(3) { animation-delay: 0.24s; }
    .speaking .sound-wave span:nth-child(4) { animation-delay: 0.36s; }
    .speaking .sound-wave span:nth-child(5) { animation-delay: 0.48s; }
    @keyframes wv { 0%,100%{transform:scaleY(0.45)} 50%{transform:scaleY(1)} }

    /* install toast */
    #install-bar {
      position: fixed;
      bottom: calc(0px + var(--safe-bot));
      left: 0; right: 0;
      background: #1a1410;
      color: #f0e8dc;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.35s ease;
    }
    #install-bar.show { transform: translateY(0); }
    #install-bar button {
      background: var(--red); color: #fff;
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    #install-dismiss { background: transparent !important; color: var(--text3) !important; padding: 7px 8px !important; }
  </style>
</head>
<body>

<div id="app-header" class="header">
  <div class="header-flag">🇨🇳</div>
  <div>
    <div class="header-title">中国の省</div>
    <div class="header-sub">全省・直轄市・自治区 — 発音学習</div>
  </div>
</div>

<!-- LIST -->

</div>

<!-- DETAIL -->
<div id="detail-view">

      <div class="map-lbl">中国地図での位置</div>
    </div>
    <div class="shape-wrap">
      <svg id="province-shape" viewBox="-12 -12 124 124" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="map-lbl" id="shape-lbl">省の形</div>
    </div>
  </div>

  <div class="detail-body">
    <div class="name-row">
      <span class="d-name" id="d-name"></span>
      <span class="d-type" id="d-type"></span>
    </div>
    <div class="d-py" id="d-py"></div>

    <div class="cap-block">
      <div class="cap-icon">🏛</div>
      <div>
        <div class="cap-label">省会（省都）</div>
        <div class="cap-name" id="d-cap"></div>
        <div class="cap-py" id="d-cap-py"></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-lbl">人口ランク（全国）</div>
        <div class="stat-rank" id="d-pop-rank"></div>
        <div class="stat-val" id="d-pop-val"></div>
        <div class="rank-bar"><div class="rank-fill" id="d-pop-bar"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">面積ランク（全国）</div>
        <div class="stat-rank" id="d-area-rank"></div>
        <div class="stat-val" id="d-area-val"></div>
        <div class="rank-bar"><div class="rank-fill" id="d-area-bar"></div></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-nav" id="btn-back" onclick="showList()">← 一覧</button>
    <button class="btn-speak" id="btn-speak" onclick="speakProvince()">
      <span class="sound-wave"><span></span><span></span><span></span><span></span><span></span></span>
      発音する
    </button>
    <button class="btn-nav" id="btn-next" onclick="nextRandom()">次へ →</button>
  </div>
</div>

<!-- INSTALL BAR -->
<div id="install-bar">
  <span>ホーム画面に追加できます</span>
  <div style="display:flex;gap:6px">
    <button id="install-dismiss" onclick="dismissInstall()">後で</button>
    <button id="install-btn" onclick="doInstall()">追加する</button>
  </div>
</div>

let currentIdx = 0;
let synth = window.speechSynthesis;
let isSpeaking = false;
let deferredPrompt = null;

// ── Build list ──
function buildList() {
  const grid = document.getElementById('province-grid');
  PROVINCES.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'prov-btn';
    const short = p.name.replace(/省$|市$|特別行政区$|自治区$|壮族$|回族$|维吾尔$/, '').substring(0, 4);
    btn.innerHTML = `<span class="pn">${short}</span><span class="pp">${p.py.split(' ')[0]}</span>`;
    btn.onclick = () => showDetail(i);
    grid.appendChild(btn);
  });
}

// ── Show list ──
function showList() {
  stopSpeaking();
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('app-header').innerHTML = `
    <div class="header-flag">🇨🇳</div>
    <div>
      <div class="header-title">中国の省</div>
      <div class="header-sub">全省・直轄市・自治区 — 発音学習</div>
    </div>`;
}

// ── Show detail ──
function showDetail(idx) {
  stopSpeaking();
  currentIdx = idx;
  const p = PROVINCES[idx];

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';

  document.getElementById('app-header').innerHTML = `
    <button class="header-back" onclick="showList()">&#8592;</button>
    <div>
      <div class="header-title" style="font-size:16px">${p.name}</div>
      <div class="header-sub">${p.py}</div>
    </div>`;

  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-type').textContent = p.type;
  document.getElementById('d-py').textContent = p.py;
  document.getElementById('d-cap').textContent = p.cap;
  document.getElementById('d-cap-py').textContent = p.capPy;
  document.getElementById('d-pop-rank').textContent = p.popRank + '位';
  document.getElementById('d-pop-val').textContent = '人口 約' + p.pop + '百万人';
  document.getElementById('d-area-rank').textContent = p.areaRank + '位';
  document.getElementById('d-area-val').textContent = '面積 約' + p.area + '万km²';

  requestAnimationFrame(() => {
    document.getElementById('d-pop-bar').style.width  = ((34 - p.popRank)  / 33 * 100) + '%';
    document.getElementById('d-area-bar').style.width = ((34 - p.areaRank) / 33 * 100) + '%';
  });

  document.getElementById('shape-lbl').textContent = p.name;
  document.getElementById('detail-view').scrollTop = 0;

  drawMap(p);
  drawShape(p);

  setTimeout(() => speakProvince(), 600);
}

// ── Draw China map ──
function drawMap(prov) {
  const svg = document.getElementById('china-map');
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const mapBg = dark ? '#2a231c' : '#f0ede4';
  const dotBase = dark ? 'rgba(240,232,220,0.22)' : 'rgba(26,20,16,0.14)';

  let dots = PROVINCES.map(p => {
    const sel = p.id === prov.id;
    const r = sel ? 7 : 3.5;
    const fill = sel ? '#c0392b' : dotBase;
    const sw = sel ? '1.5' : '0';
    return `<circle cx="${p.cx}" cy="${p.cy}" r="${r}" fill="${fill}" stroke="${sel?'#fff':'none'}" stroke-width="${sw}"/>`;
  }).join('');

  svg.innerHTML = `
    <rect width="400" height="370" fill="${mapBg}" rx="8"/>
    ${dots}
    <circle cx="${prov.cx}" cy="${prov.cy}" r="7" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.7">
      <animate attributeName="r" values="7;18;7" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="${prov.cx}" y="${prov.cy - 20}" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="700" font-family="'Noto Serif SC',serif">${prov.name.replace(/省$|市$/,'').substring(0,2)}</text>`;
}

// ── Draw province shape ──
function drawShape(p) {
  const svg = document.getElementById('province-shape');
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const fill   = dark ? 'rgba(192,57,43,0.40)' : 'rgba(192,57,43,0.16)';
  const stroke = '#c0392b';
  const d = SHAPES[p.id] || 'M18,18 L82,18 L82,82 L18,82 Z';
  svg.innerHTML = `<path d="${d}" fill="${fill}" stroke="${stroke}" stroke-width="2.5" stroke-linejoin="round"/>`;
}

// ── Speech ──
function speakProvince() {
  if (!synth) return;
  stopSpeaking();
  const p = PROVINCES[currentIdx];
  const btn = document.getElementById('btn-speak');

  const queue = [p.name, p.cap];
  let qi = 0;

  function next() {
    if (qi >= queue.length) { stopSpeaking(); return; }
    const u = new SpeechSynthesisUtterance(queue[qi]);
    u.lang = 'zh-CN';
    u.rate = 0.82;
    u.pitch = 1.0;
    u.onstart  = () => { isSpeaking = true; btn.classList.add('speaking'); };
    u.onend    = () => { qi++; setTimeout(next, 450); };
    u.onerror  = () => stopSpeaking();
    synth.speak(u);
    qi++;
  }
  next();
}

function stopSpeaking() {
  if (synth) synth.cancel();
  isSpeaking = false;
  const btn = document.getElementById('btn-speak');
  if (btn) btn.classList.remove('speaking');
}

function nextRandom() {
  stopSpeaking();
  let n = currentIdx;
  while (n === currentIdx) n = Math.floor(Math.random() * PROVINCES.length);
  showDetail(n);
}

// ── PWA Install ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const bar = document.getElementById('install-bar');
  if (!localStorage.getItem('install-dismissed')) {
    setTimeout(() => bar.classList.add('show'), 2000);
  }
});

function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    dismissInstall();
  });
}

function dismissInstall() {
  document.getElementById('install-bar').classList.remove('show');
  localStorage.setItem('install-dismissed', '1');
}

window.addEventListener('appinstalled', () => dismissInstall());

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Init ──
buildList();
</script>
