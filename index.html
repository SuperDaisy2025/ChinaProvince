<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="中国省">
  <meta name="theme-color" content="#c0392b">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>中国の省 – 発音学習</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#faf8f3; --bg2:#f0ede4; --bg3:#e8e4da; --card:#ffffff;
      --text:#1a1410; --text2:#6b5f52; --text3:#9e9186; --red:#c0392b;
      --border:rgba(26,20,16,0.10); --border2:rgba(26,20,16,0.18);
      --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
    }
    @media (prefers-color-scheme:dark) {
      :root {
        --bg:#1a1410; --bg2:#231e18; --bg3:#2e271f; --card:#2a231c;
        --text:#f0e8dc; --text2:#a89880; --text3:#6e6055;
        --border:rgba(240,232,220,0.10); --border2:rgba(240,232,220,0.20);
      }
    }
    html,body { height:100%; overflow:hidden; }
    body {
      font-family:'Noto Sans SC',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      height:100dvh; display:flex; flex-direction:column;
    }

    /* HEADER */
    .header {
      background:var(--red); color:#fff;
      padding:10px 14px; padding-top:calc(10px + var(--safe-top));
      display:flex; align-items:center; gap:10px;
      flex-shrink:0; user-select:none;
    }
    .header-flag { font-size:22px; line-height:1; }
    .header-title { font-size:18px; font-weight:700; font-family:'Noto Serif SC',serif; letter-spacing:0.06em; flex:1; }
    .header-sub { font-size:13px; opacity:0.85; margin-top:2px; }
    .header-back {
      background:rgba(255,255,255,0.22); border:none; color:#fff;
      width:34px; height:34px; border-radius:9px; cursor:pointer; font-size:18px;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.15s; flex-shrink:0;
    }
    .header-back:active { background:rgba(255,255,255,0.38); }

    /* LIST */
    #list-view {
      flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
      padding:8px 8px calc(8px + var(--safe-bot));
    }
    .province-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
    .prov-btn {
      background:var(--card); border:1px solid var(--border); border-radius:10px;
      padding:10px 3px 9px; cursor:pointer; text-align:center;
      transition:transform 0.12s,background 0.12s;
      display:flex; flex-direction:column; align-items:center; gap:3px;
      touch-action:manipulation;
    }
    .prov-btn:active { transform:scale(0.94); background:var(--red); border-color:var(--red); }
    .prov-btn:active .pn,.prov-btn:active .pp { color:#fff !important; }
    .pn { font-size:14px; font-family:'Noto Serif SC',serif; color:var(--text); font-weight:600; line-height:1.2; }
    .pp { font-size:11px; color:var(--text3); line-height:1.3; }

    /* DETAIL */
    #detail-view { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; display:none; }

    /* ── 地図エリア：画像の上にSVGドットを重ねる ── */
    .map-area {
      background:var(--bg2);
      padding:10px;
      position:relative;
    }
    .map-container {
      position:relative;
      width:100%;
      border-radius:8px;
      overflow:hidden;
      background:#d0cfc8;
    }
    .map-container img {
      width:100%;
      height:auto;
      display:block;
    }
    /* SVGオーバーレイ：画像と完全に重なる */
    .map-overlay {
      position:absolute;
      top:0; left:0; width:100%; height:100%;
      pointer-events:none;
    }
    .map-lbl { font-size:12px; color:var(--text3); text-align:center; margin-top:5px; }

    /* DETAIL BODY */
    .detail-body { padding:14px 14px 6px; }

    .name-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .d-name { font-family:'Noto Serif SC',serif; font-size:30px; font-weight:700; color:var(--text); line-height:1.1; }
    .d-type { font-size:13px; color:var(--text3); background:var(--bg2); border-radius:20px; padding:3px 10px; white-space:nowrap; }
    .d-py { font-size:16px; color:var(--text2); margin-top:4px; letter-spacing:0.02em; }

    /* 発音アイコン */
    .speak-icon-btn {
      background:none; border:none; cursor:pointer; padding:3px;
      display:inline-flex; align-items:center; justify-content:center;
      touch-action:manipulation; flex-shrink:0; transition:transform 0.1s;
    }
    .speak-icon-btn:active { transform:scale(0.82); }
    .speak-icon-btn svg { display:block; }
    .speak-icon-btn .bar1,.speak-icon-btn .bar2,.speak-icon-btn .bar3 {
      transform-box:fill-box; transform-origin:center bottom;
    }
    .speak-icon-btn.playing .bar1 { animation:sb1 0.7s ease-in-out infinite; }
    .speak-icon-btn.playing .bar2 { animation:sb2 0.7s ease-in-out infinite 0.15s; }
    .speak-icon-btn.playing .bar3 { animation:sb3 0.7s ease-in-out infinite 0.30s; }
    @keyframes sb1 { 0%,100%{transform:scaleY(0.45)} 50%{transform:scaleY(0.9)} }
    @keyframes sb2 { 0%,100%{transform:scaleY(0.5)}  50%{transform:scaleY(1.0)} }
    @keyframes sb3 { 0%,100%{transform:scaleY(0.45)} 50%{transform:scaleY(0.8)} }

    /* 省会 */
    .cap-block {
      margin-top:12px; background:var(--bg2); border-radius:10px;
      padding:11px 13px; display:flex; align-items:center; gap:10px;
    }
    .cap-icon { font-size:20px; flex-shrink:0; }
    .cap-label { font-size:13px; color:var(--text3); margin-bottom:3px; }
    .cap-name-row { display:flex; align-items:center; gap:8px; }
    .cap-name { font-family:'Noto Serif SC',serif; font-size:22px; font-weight:600; line-height:1.2; }
    .cap-py { font-size:14px; color:var(--text2); margin-top:2px; }

    /* stats */
    .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .stat-card { background:var(--bg2); border-radius:10px; padding:10px 12px; }
    .stat-lbl { font-size:13px; color:var(--text3); margin-bottom:4px; }
    .stat-rank { font-size:24px; font-weight:700; color:var(--red); line-height:1; }
    .stat-val { font-size:13px; color:var(--text2); margin-top:3px; line-height:1.4; }
    .rank-bar { height:4px; background:var(--border); border-radius:2px; margin-top:7px; overflow:hidden; }
    .rank-fill { height:100%; background:var(--red); border-radius:2px; width:0; transition:width 0.7s cubic-bezier(0.4,0,0.2,1); }

    /* ACTIONS */
    .actions { display:flex; gap:8px; padding:12px 14px calc(12px + var(--safe-bot)); }
    .btn-nav {
      flex:1; background:var(--card); border:1px solid var(--border2); color:var(--text);
      border-radius:11px; padding:14px 13px; font-size:15px; font-weight:500;
      cursor:pointer; transition:background 0.12s,transform 0.1s;
      touch-action:manipulation; white-space:nowrap; text-align:center;
    }
    .btn-nav:active { background:var(--bg3); transform:scale(0.96); }

    /* install toast */
    #install-bar {
      position:fixed; bottom:calc(0px + var(--safe-bot)); left:0; right:0;
      background:#1a1410; color:#f0e8dc; padding:12px 16px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      font-size:14px; z-index:200; transform:translateY(100%); transition:transform 0.35s ease;
    }
    #install-bar.show { transform:translateY(0); }
    #install-bar button {
      background:var(--red); color:#fff; border:none; border-radius:8px;
      padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
    }
    #install-dismiss { background:transparent !important; color:#a89880 !important; padding:7px 8px !important; }
  </style>
</head>
<body>

<div id="app-header" class="header">
  <div class="header-flag">🇨🇳</div>
  <div>
    <div class="header-title">中国の省</div>
    <div class="header-sub">全省・直轄市・自治区 — 発音学習</div>
  </div>
</div>

<div id="list-view">
  <div class="province-grid" id="province-grid"></div>
</div>

<div id="detail-view">

  <div class="map-area">
    <div class="map-container" id="map-container">
      <img id="map-img" src="images/chinamap04.jpg" alt="中国地図">
      <!-- viewBoxは画像の実サイズ(px)に合わせる。JavaScriptで動的に設定 -->
      <svg class="map-overlay" id="map-overlay" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="map-lbl">🔴 省庁所在地（省都）　🟡 省の重心</div>
  </div>

  <div class="detail-body">
    <div class="name-row">
      <span class="d-name" id="d-name"></span>
      <button class="speak-icon-btn" id="speak-prov-btn" onclick="speakOne('prov')">
        <svg width="30" height="30" viewBox="0 0 30 30">
          <circle cx="15" cy="15" r="14" fill="#c0392b"/>
          <rect class="bar1" x="8"  y="11" width="3.5" height="8"  rx="1.75" fill="#fff"/>
          <rect class="bar2" x="13" y="9"  width="3.5" height="12" rx="1.75" fill="#fff"/>
          <rect class="bar3" x="18" y="10" width="3.5" height="10" rx="1.75" fill="#fff"/>
        </svg>
      </button>
      <span class="d-type" id="d-type"></span>
    </div>
    <div class="d-py" id="d-py"></div>

    <div class="cap-block">
      <div class="cap-icon">🏛</div>
      <div style="flex:1;min-width:0">
        <div class="cap-label">省会（省都）</div>
        <div class="cap-name-row">
          <span class="cap-name" id="d-cap"></span>
          <button class="speak-icon-btn" id="speak-cap-btn" onclick="speakOne('cap')">
            <svg width="26" height="26" viewBox="0 0 30 30">
              <circle cx="15" cy="15" r="14" fill="#c0392b"/>
              <rect class="bar1" x="8"  y="11" width="3.5" height="8"  rx="1.75" fill="#fff"/>
              <rect class="bar2" x="13" y="9"  width="3.5" height="12" rx="1.75" fill="#fff"/>
              <rect class="bar3" x="18" y="10" width="3.5" height="10" rx="1.75" fill="#fff"/>
            </svg>
          </button>
        </div>
        <div class="cap-py" id="d-cap-py"></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-lbl">人口ランク（全国）</div>
        <div class="stat-rank" id="d-pop-rank"></div>
        <div class="stat-val" id="d-pop-val"></div>
        <div class="rank-bar"><div class="rank-fill" id="d-pop-bar"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">面積ランク（全国）</div>
        <div class="stat-rank" id="d-area-rank"></div>
        <div class="stat-val" id="d-area-val"></div>
        <div class="rank-bar"><div class="rank-fill" id="d-area-bar"></div></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-nav" onclick="showList()">← 一覧</button>
    <button class="btn-nav" onclick="nextRandom()">次へ →</button>
  </div>
</div>

<div id="install-bar">
  <span>ホーム画面に追加できます</span>
  <div style="display:flex;gap:6px">
    <button id="install-dismiss" onclick="dismissInstall()">後で</button>
    <button onclick="doInstall()">追加する</button>
  </div>
</div>

  // その他
  { id:'taiwan',       name:'台湾省',          py:'Táiwān',       type:'省',        cap:'台北',     capPy:'Táiběi',       pop:23.4,  popRank:25, area:3.6,   areaRank:30, cx:510, cy:395, capX:508, capY:382 },
  { id:'hongkong',     name:'香港特別行政区',  py:'Xiānggǎng',    type:'特別行政区',cap:'香港',     capPy:'Xiānggǎng',    pop:7.5,   popRank:29, area:0.1,   areaRank:34, cx:453, cy:428, capX:453, capY:428 },
  { id:'macao',        name:'澳門特別行政区',  py:'Àomén',        type:'特別行政区',cap:'澳門',     capPy:'Àomén',        pop:0.7,   popRank:34, area:0.03,  areaRank:34, cx:443, cy:432, capX:443, capY:432 },
];

let currentIdx = 0;
const synth = window.speechSynthesis;
let deferredPrompt = null;
let activeSpeakBtn = null;

// 画像ロード後にviewBoxを実サイズに合わせる
const mapImg = document.getElementById('map-img');
const mapOverlay = document.getElementById('map-overlay');

function syncOverlay() {
  const w = mapImg.naturalWidth  || MAP_W;
  const h = mapImg.naturalHeight || MAP_H;
  mapOverlay.setAttribute('viewBox', `0 0 ${w} ${h}`);
}
mapImg.addEventListener('load', syncOverlay);
if (mapImg.complete) syncOverlay();

// ── LIST ──
function buildList() {
  const grid = document.getElementById('province-grid');
  PROVINCES.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'prov-btn';
    const short = p.name.replace(/省$|市$|特別行政区$|自治区$|壮族$|回族$|维吾尔$/, '').substring(0,4);
    btn.innerHTML = `<span class="pn">${short}</span><span class="pp">${p.py.split(' ')[0]}</span>`;
    btn.onclick = () => showDetail(i);
    grid.appendChild(btn);
  });
}

function showList() {
  stopSpeaking();
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('app-header').innerHTML = `
    <div class="header-flag">🇨🇳</div>
    <div><div class="header-title">中国の省</div>
    <div class="header-sub">全省・直轄市・自治区 — 発音学習</div></div>`;
}

function showDetail(idx) {
  stopSpeaking();
  currentIdx = idx;
  const p = PROVINCES[idx];

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';

  document.getElementById('app-header').innerHTML = `
    <button class="header-back" onclick="showList()">&#8592;</button>
    <div><div class="header-title" style="font-size:16px">${p.name}</div>
    <div class="header-sub">${p.py}</div></div>`;

  document.getElementById('d-name').textContent = p.name;
  document.getElementById('d-type').textContent = p.type;
  document.getElementById('d-py').textContent = p.py;
  document.getElementById('d-cap').textContent = p.cap;
  document.getElementById('d-cap-py').textContent = p.capPy;
  document.getElementById('d-pop-rank').textContent = p.popRank + '位';
  document.getElementById('d-pop-val').textContent = '人口 約' + p.pop + '百万人';
  document.getElementById('d-area-rank').textContent = p.areaRank + '位';
  document.getElementById('d-area-val').textContent = '面積 約' + p.area + '万km²';

  requestAnimationFrame(() => {
    document.getElementById('d-pop-bar').style.width  = ((34 - p.popRank)  / 33 * 100) + '%';
    document.getElementById('d-area-bar').style.width = ((34 - p.areaRank) / 33 * 100) + '%';
  });

  document.getElementById('detail-view').scrollTop = 0;
  drawDots(p);
  setTimeout(() => speakBoth(), 600);
}

// ── 地図に赤点（省都）・黄点（省重心）を描画 ──
function drawDots(p) {
  // 画像の実サイズを取得してスケール係数を計算
  const imgW = mapImg.naturalWidth  || MAP_W;
  const imgH = mapImg.naturalHeight || MAP_H;

  // 座標はMAP_W×MAP_H基準で入力→実画像サイズにスケール
  const sx = imgW / MAP_W;
  const sy = imgH / MAP_H;

  const capX = p.capX * sx;
  const capY = p.capY * sy;

  // 点のサイズも画像サイズに合わせてスケール
  const dotR = Math.max(8, imgW * 0.013);
  const pulseR = dotR * 2.2;

  mapOverlay.innerHTML = `
    <!-- 省都：赤点＋パルスアニメ -->
    <circle cx="${capX}" cy="${capY}" r="${pulseR}" fill="none" stroke="#c0392b" stroke-width="${dotR*0.25}" opacity="0.5">
      <animate attributeName="r" values="${dotR};${pulseR*1.5};${dotR}" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.0;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="${capX}" cy="${capY}" r="${dotR}" fill="#c0392b" stroke="#fff" stroke-width="${dotR*0.28}"/>
    <!-- 省都ラベル -->
    <text x="${capX}" y="${capY - dotR - 4}" text-anchor="middle"
      font-size="${Math.max(14, imgW * 0.022)}" font-weight="700"
      fill="#c0392b" stroke="#fff" stroke-width="3" paint-order="stroke"
      font-family="'Noto Serif SC',serif">${p.cap}</text>
  `;
}

// ── Speech ──
function speakBoth() {
  if (!synth) return;
  stopSpeaking();
  const p = PROVINCES[currentIdx];
  const provBtn = document.getElementById('speak-prov-btn');
  const capBtn  = document.getElementById('speak-cap-btn');

  const u1 = new SpeechSynthesisUtterance(p.name);
  u1.lang = 'zh-CN'; u1.rate = 0.82; u1.pitch = 1.0;
  u1.onstart = () => { activeSpeakBtn = provBtn; provBtn && provBtn.classList.add('playing'); };
  u1.onend   = () => {
    provBtn && provBtn.classList.remove('playing');
    activeSpeakBtn = null;
    setTimeout(() => {
      const u2 = new SpeechSynthesisUtterance(p.cap);
      u2.lang = 'zh-CN'; u2.rate = 0.82; u2.pitch = 1.0;
      u2.onstart = () => { activeSpeakBtn = capBtn; capBtn && capBtn.classList.add('playing'); };
      u2.onend   = () => { capBtn && capBtn.classList.remove('playing'); activeSpeakBtn = null; };
      u2.onerror = () => { capBtn && capBtn.classList.remove('playing'); activeSpeakBtn = null; };
      synth.speak(u2);
    }, 800);
  };
  u1.onerror = () => { provBtn && provBtn.classList.remove('playing'); activeSpeakBtn = null; };
  synth.speak(u1);
}

function speakOne(target) {
  if (!synth) return;
  stopSpeaking();
  const p = PROVINCES[currentIdx];
  const text = target === 'prov' ? p.name : p.cap;
  const btn  = document.getElementById(target === 'prov' ? 'speak-prov-btn' : 'speak-cap-btn');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.82; u.pitch = 1.0;
  u.onstart = () => { activeSpeakBtn = btn; btn && btn.classList.add('playing'); };
  u.onend   = () => { btn && btn.classList.remove('playing'); activeSpeakBtn = null; };
  u.onerror = () => { btn && btn.classList.remove('playing'); activeSpeakBtn = null; };
  synth.speak(u);
}

function stopSpeaking() {
  if (synth) synth.cancel();
  if (activeSpeakBtn) activeSpeakBtn.classList.remove('playing');
  activeSpeakBtn = null;
  document.querySelectorAll('.speak-icon-btn').forEach(b => b.classList.remove('playing'));
}

function nextRandom() {
  stopSpeaking();
  let n = currentIdx;
  while (n === currentIdx) n = Math.floor(Math.random() * PROVINCES.length);
  showDetail(n);
}

// ── PWA ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!localStorage.getItem('install-dismissed'))
    setTimeout(() => document.getElementById('install-bar').classList.add('show'), 2000);
});
function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; dismissInstall(); });
}
function dismissInstall() {
  document.getElementById('install-bar').classList.remove('show');
  localStorage.setItem('install-dismissed','1');
}
window.addEventListener('appinstalled', () => dismissInstall());
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

buildList();
</script>
</body>
</html>
