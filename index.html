<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="中国省">
  <meta name="theme-color" content="#c0392b">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>中国の省 – 発音学習</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg:#faf8f3; --bg2:#f0ede4; --bg3:#e8e4da; --card:#ffffff;
      --text:#1a1410; --text2:#6b5f52; --text3:#9e9186;
      --red:#c0392b; --green:#27ae60;
      --border:rgba(26,20,16,0.10); --border2:rgba(26,20,16,0.18);
      --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
    }
    @media (prefers-color-scheme:dark) {
      :root {
        --bg:#1a1410; --bg2:#231e18; --bg3:#2e271f; --card:#2a231c;
        --text:#f0e8dc; --text2:#a89880; --text3:#6e6055;
        --border:rgba(240,232,220,0.10); --border2:rgba(240,232,220,0.20);
      }
    }
    html,body { height:100%; overflow:hidden; }
    body { font-family:'Noto Sans SC',system-ui,sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; }

    /* HEADER */
    .header { background:var(--red); color:#fff; padding:10px 14px; padding-top:calc(10px + var(--safe-top)); display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .header-flag { font-size:22px; line-height:1; }
    .header-title { font-size:18px; font-weight:700; font-family:'Noto Serif SC',serif; letter-spacing:0.06em; flex:1; }
    .header-sub { font-size:13px; opacity:0.85; margin-top:2px; }
    .header-back { background:rgba(255,255,255,0.22); border:none; color:#fff; width:34px; height:34px; border-radius:9px; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .header-back:active { background:rgba(255,255,255,0.38); }

    /* LIST */
    #list-view { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:8px 8px calc(8px + var(--safe-bot)); display:flex; flex-direction:column; gap:8px; }
    .quiz-banner { background:linear-gradient(135deg,#1a1410 0%,#2e1a10 100%); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; border:1.5px solid rgba(192,57,43,0.4); transition:transform 0.1s,border-color 0.15s; }
    .quiz-banner:active { transform:scale(0.98); }
    .quiz-banner-icon { font-size:32px; flex-shrink:0; }
    .quiz-banner-title { font-size:17px; font-weight:700; color:#f0e8dc; font-family:'Noto Serif SC',serif; }
    .quiz-banner-sub { font-size:12px; color:#a89880; margin-top:3px; }
    .quiz-banner-arrow { font-size:20px; color:#c0392b; }
    .province-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
    .prov-btn { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 3px 9px; cursor:pointer; text-align:center; transition:transform 0.12s,background 0.12s; display:flex; flex-direction:column; align-items:center; gap:3px; touch-action:manipulation; }
    .prov-btn:active { transform:scale(0.94); background:var(--red); border-color:var(--red); }
    .prov-btn:active .pn,.prov-btn:active .pp { color:#fff !important; }
    .pn { font-size:14px; font-family:'Noto Serif SC',serif; color:var(--text); font-weight:600; line-height:1.2; }
    .pp { font-size:11px; color:var(--text3); line-height:1.3; }

    /* DETAIL */
    #detail-view { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; display:none; }
    .map-area { background:var(--bg2); padding:10px; }
    .map-container { position:relative; width:100%; border-radius:8px; overflow:hidden; background:#d0cfc8; }
    .map-container img { width:100%; height:auto; display:block; }
    .map-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    .map-lbl { font-size:12px; color:var(--text3); text-align:center; margin-top:5px; }
    .detail-body { padding:14px 14px 6px; }
    .name-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .d-name { font-family:'Noto Serif SC',serif; font-size:30px; font-weight:700; color:var(--text); line-height:1.1; }
    .d-type { font-size:13px; color:var(--text3); background:var(--bg2); border-radius:20px; padding:3px 10px; white-space:nowrap; }
    .d-py { font-size:16px; color:var(--text2); margin-top:4px; }
    .speak-icon-btn { background:none; border:none; cursor:pointer; padding:3px; display:inline-flex; align-items:center; justify-content:center; touch-action:manipulation; flex-shrink:0; transition:transform 0.1s; }
    .speak-icon-btn:active { transform:scale(0.82); }
    .speak-icon-btn svg { display:block; }
    .speak-icon-btn .bar1,.speak-icon-btn .bar2,.speak-icon-btn .bar3 { transform-box:fill-box; transform-origin:center bottom; }
    .speak-icon-btn.playing .bar1 { animation:sb1 0.7s ease-in-out infinite; }
    .speak-icon-btn.playing .bar2 { animation:sb2 0.7s ease-in-out infinite 0.15s; }
    .speak-icon-btn.playing .bar3 { animation:sb3 0.7s ease-in-out infinite 0.30s; }
    @keyframes sb1 { 0%,100%{transform:scaleY(0.45)} 50%{transform:scaleY(0.9)} }
    @keyframes sb2 { 0%,100%{transform:scaleY(0.5)}  50%{transform:scaleY(1.0)} }
    @keyframes sb3 { 0%,100%{transform:scaleY(0.45)} 50%{transform:scaleY(0.8)} }
    .cap-block { margin-top:12px; background:var(--bg2); border-radius:10px; padding:11px 13px; display:flex; align-items:center; gap:10px; }
    .cap-icon { font-size:20px; flex-shrink:0; }
    .cap-label { font-size:13px; color:var(--text3); margin-bottom:3px; }
    .cap-name-row { display:flex; align-items:center; gap:8px; }
    .cap-name { font-family:'Noto Serif SC',serif; font-size:22px; font-weight:600; }
    .cap-py { font-size:14px; color:var(--text2); margin-top:2px; }
    .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .stat-card { background:var(--bg2); border-radius:10px; padding:10px 12px; }
    .stat-lbl { font-size:13px; color:var(--text3); margin-bottom:4px; }
    .stat-rank { font-size:24px; font-weight:700; color:var(--red); line-height:1; }
    .stat-val { font-size:13px; color:var(--text2); margin-top:3px; }
    .rank-bar { height:4px; background:var(--border); border-radius:2px; margin-top:7px; overflow:hidden; }
    .rank-fill { height:100%; background:var(--red); border-radius:2px; width:0; transition:width 0.7s cubic-bezier(0.4,0,0.2,1); }
    .actions { display:flex; gap:8px; padding:12px 14px calc(12px + var(--safe-bot)); }
    .btn-nav { flex:1; background:var(--card); border:1px solid var(--border2); color:var(--text); border-radius:11px; padding:14px 13px; font-size:15px; font-weight:500; cursor:pointer; transition:background 0.12s,transform 0.1s; touch-action:manipulation; text-align:center; }
    .btn-nav:active { background:var(--bg3); transform:scale(0.96); }

    /* QUIZ */
    #quiz-view { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; display:none; flex-direction:column; }
    .quiz-progress { padding:10px 14px 6px; }
    .quiz-progress-bar-wrap { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .quiz-progress-bar { height:100%; background:var(--red); border-radius:3px; transition:width 0.4s ease; }
    .quiz-progress-labels { display:flex; justify-content:space-between; margin-top:5px; font-size:12px; color:var(--text3); }
    .wrong-count { color:#e67e22; font-weight:600; }
    .quiz-map-area { padding:0 10px 8px; }
    .quiz-question { text-align:center; padding:8px 14px 10px; font-size:15px; color:var(--text2); font-weight:500; }
    .quiz-question b { color:var(--text); font-size:17px; }
    .quiz-answer-area { padding:0 14px; }
    .quiz-reveal-btn { width:100%; background:var(--red); color:#fff; border:none; border-radius:12px; padding:16px; font-size:17px; font-weight:700; cursor:pointer; font-family:'Noto Serif SC',serif; letter-spacing:0.05em; transition:opacity 0.15s,transform 0.1s; touch-action:manipulation; }
    .quiz-reveal-btn:active { opacity:0.8; transform:scale(0.98); }
    .quiz-answer-card { background:var(--card); border:1.5px solid var(--border2); border-radius:12px; padding:16px; display:none; }
    .quiz-answer-card.show { display:block; }
    .qa-name { font-family:'Noto Serif SC',serif; font-size:28px; font-weight:700; color:var(--text); }
    .qa-py { font-size:15px; color:var(--text2); margin-top:3px; }
    .qa-type { display:inline-block; font-size:12px; color:var(--text3); background:var(--bg2); border-radius:20px; padding:2px 9px; margin-top:5px; }
    .qa-cap-row { margin-top:12px; background:var(--bg2); border-radius:9px; padding:10px 12px; display:flex; align-items:center; gap:8px; }
    .qa-cap-label { font-size:12px; color:var(--text3); margin-bottom:2px; }
    .qa-cap-name { font-family:'Noto Serif SC',serif; font-size:20px; font-weight:600; }
    .qa-cap-py { font-size:13px; color:var(--text2); margin-top:1px; }
    .quiz-judge-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .btn-correct { background:var(--green); color:#fff; border:none; border-radius:11px; padding:15px 10px; font-size:16px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; transition:opacity 0.15s,transform 0.1s; touch-action:manipulation; }
    .btn-correct:active { opacity:0.8; transform:scale(0.97); }
    .btn-wrong { background:#e67e22; color:#fff; border:none; border-radius:11px; padding:15px 10px; font-size:16px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; transition:opacity 0.15s,transform 0.1s; touch-action:manipulation; }
    .btn-wrong:active { opacity:0.8; transform:scale(0.97); }
    .btn-judge-sub { font-size:11px; font-weight:400; opacity:0.85; }
    .quiz-finish { display:none; flex-direction:column; align-items:center; justify-content:center; padding:30px 24px; text-align:center; flex:1; gap:14px; }
    .quiz-finish.show { display:flex; }
    .quiz-finish-icon { font-size:56px; }
    .quiz-finish-title { font-family:'Noto Serif SC',serif; font-size:24px; font-weight:700; }
    .quiz-finish-sub { font-size:15px; color:var(--text2); line-height:1.7; white-space:pre-line; }
    .quiz-finish-stats { background:var(--bg2); border-radius:12px; padding:14px 20px; width:100%; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .quiz-stat { text-align:center; }
    .quiz-stat-num { font-size:28px; font-weight:700; }
    .quiz-stat-lbl { font-size:12px; color:var(--text3); margin-top:2px; }
    .quiz-finish-btns { display:flex; gap:8px; width:100%; flex-wrap:wrap; }
    .quiz-finish-btn { flex:1; border:none; border-radius:11px; padding:14px; font-size:15px; font-weight:600; cursor:pointer; touch-action:manipulation; min-width:120px; }
    .quiz-finish-btn.retry { background:var(--red); color:#fff; }
    .quiz-finish-btn.retry-wrong { background:#e67e22; color:#fff; }
    .quiz-finish-btn.home { background:var(--card); border:1px solid var(--border2); color:var(--text); }
    .quiz-nav { display:flex; gap:8px; padding:10px 14px calc(10px + var(--safe-bot)); flex-shrink:0; }
    .quiz-nav-btn { flex:1; background:var(--card); border:1px solid var(--border2); color:var(--text); border-radius:10px; padding:12px; font-size:14px; cursor:pointer; text-align:center; touch-action:manipulation; }
    .quiz-nav-btn:active { background:var(--bg3); }

    /* install */
    #install-bar { position:fixed; bottom:calc(0px + var(--safe-bot)); left:0; right:0; background:#1a1410; color:#f0e8dc; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:14px; z-index:200; transform:translateY(100%); transition:transform 0.35s ease; }
    #install-bar.show { transform:translateY(0); }
    #install-bar button { background:var(--red); color:#fff; border:none; border-radius:8px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; }
    #install-dismiss { background:transparent !important; color:#a89880 !important; padding:7px 8px !important; }
  </style>
</head>
<body>

<div id="app-header" class="header">
  <div class="header-flag">🇨🇳</div>
  <div>
    <div class="header-title">中国の省</div>
    <div class="header-sub">全省・直轄市・自治区 — 発音学習</div>
  </div>
</div>

<!-- LIST -->
<div id="list-view">
  <div class="quiz-banner" onclick="startQuiz()">
    <div class="quiz-banner-icon">🗺</div>
    <div class="quiz-banner-text">
      <div class="quiz-banner-title">クイズモード</div>
      <div class="quiz-banner-sub">地図の赤点がどの省か当てよう！</div>
    </div>
    <div class="quiz-banner-arrow">›</div>
  </div>
  <div class="province-grid" id="province-grid"></div>
</div>

<!-- DETAIL -->
<div id="detail-view">
  <div class="map-area">
    <div class="map-container">
      <img id="map-img" src="images/chinamap04.jpg" alt="中国地図">
      <svg class="map-overlay" id="map-overlay" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="map-lbl">🔴 省都の位置</div>
  </div>
  <div class="detail-body">
    <div class="name-row">
      <span class="d-name" id="d-name"></span>
      <button class="speak-icon-btn" id="speak-prov-btn" onclick="speakOne('prov')">
        <svg width="30" height="30" viewBox="0 0 30 30"><circle cx="15" cy="15" r="14" fill="#c0392b"/><rect class="bar1" x="8" y="11" width="3.5" height="8" rx="1.75" fill="#fff"/><rect class="bar2" x="13" y="9" width="3.5" height="12" rx="1.75" fill="#fff"/><rect class="bar3" x="18" y="10" width="3.5" height="10" rx="1.75" fill="#fff"/></svg>
      </button>
      <span class="d-type" id="d-type"></span>
    </div>
    <div class="d-py" id="d-py"></div>
    <div class="cap-block">
      <div class="cap-icon">🏛</div>
      <div style="flex:1;min-width:0">
        <div class="cap-label">省会（省都）</div>
        <div class="cap-name-row">
          <span class="cap-name" id="d-cap"></span>
          <button class="speak-icon-btn" id="speak-cap-btn" onclick="speakOne('cap')">
            <svg width="26" height="26" viewBox="0 0 30 30"><circle cx="15" cy="15" r="14" fill="#c0392b"/><rect class="bar1" x="8" y="11" width="3.5" height="8" rx="1.75" fill="#fff"/><rect class="bar2" x="13" y="9" width="3.5" height="12" rx="1.75" fill="#fff"/><rect class="bar3" x="18" y="10" width="3.5" height="10" rx="1.75" fill="#fff"/></svg>
          </button>
        </div>
        <div class="cap-py" id="d-cap-py"></div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-lbl">人口ランク（全国）</div>
        <div class="stat-rank" id="d-pop-rank"></div>
        <div class="stat-val" id="d-pop-val"></div>
        <div class="rank-bar"><div class="rank-fill" id="d-pop-bar"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-lbl">面積ランク（全国）</div>
        <div class="stat-rank" id="d-area-rank"></div>
        <div class="stat-val" id="d-area-val"></div>
        <div class="rank-bar"><div class="rank-fill" id="d-area-bar"></div></div>
      </div>
    </div>
  </div>
  <div class="actions">
    <button class="btn-nav" onclick="showList()">← 一覧</button>
    <button class="btn-nav" onclick="nextRandom()">次へ →</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz-view">
  <div class="quiz-progress">
    <div class="quiz-progress-bar-wrap"><div class="quiz-progress-bar" id="q-progress-bar" style="width:0%"></div></div>
    <div class="quiz-progress-labels">
      <span id="q-progress-text">0 / 0</span>
      <span class="wrong-count" id="q-wrong-label"></span>
    </div>
  </div>
  <div class="quiz-map-area">
    <div class="map-container">
      <img id="q-map-img" src="images/chinamap04.jpg" alt="中国地図">
      <svg class="map-overlay" id="q-map-overlay" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
  </div>
  <div class="quiz-question" id="q-question"><b>この省はどこでしょう？</b></div>
  <div class="quiz-answer-area">
    <button class="quiz-reveal-btn" id="q-reveal-btn" onclick="revealAnswer()">答えを見る</button>
    <div class="quiz-answer-card" id="q-answer-card">
      <div class="qa-name" id="qa-name"></div>
      <div class="qa-py"   id="qa-py"></div>
      <div class="qa-type" id="qa-type"></div>
      <div class="qa-cap-row">
        <div style="font-size:18px;flex-shrink:0">🏛</div>
        <div>
          <div class="qa-cap-label">省会（省都）</div>
          <div class="qa-cap-name" id="qa-cap"></div>
          <div class="qa-cap-py"   id="qa-cap-py"></div>
        </div>
      </div>
      <div class="quiz-judge-row">
        <button class="btn-correct" onclick="judgeAnswer(true)">✓ 正解<span class="btn-judge-sub">次の問題へ</span></button>
        <button class="btn-wrong"   onclick="judgeAnswer(false)">✗ 間違い<span class="btn-judge-sub">再出題を増やす</span></button>
      </div>
    </div>
  </div>
  <div class="quiz-finish" id="quiz-finish">
    <div class="quiz-finish-icon"  id="qf-icon">🎉</div>
    <div class="quiz-finish-title" id="qf-title">ラウンド終了！</div>
    <div class="quiz-finish-sub"   id="qf-sub"></div>
    <div class="quiz-finish-stats">
      <div class="quiz-stat"><div class="quiz-stat-num" id="qf-correct" style="color:var(--green)">0</div><div class="quiz-stat-lbl">✓ 正解</div></div>
      <div class="quiz-stat"><div class="quiz-stat-num" id="qf-wrong"   style="color:#e67e22">0</div><div class="quiz-stat-lbl">✗ 間違い</div></div>
    </div>
    <div class="quiz-finish-btns">
      <button class="quiz-finish-btn retry-wrong" id="qf-retry-wrong" onclick="retryWrong()" style="display:none">間違いのみ再挑戦</button>
      <button class="quiz-finish-btn retry" onclick="startQuiz()">全問やり直す</button>
      <button class="quiz-finish-btn home"  onclick="showList()">一覧へ</button>
    </div>
  </div>
  <div class="quiz-nav" id="quiz-nav">
    <button class="quiz-nav-btn" onclick="showList()">← 一覧へ戻る</button>
  </div>
</div>

<div id="install-bar">
  <span>ホーム画面に追加できます</span>
  <div style="display:flex;gap:6px">
    <button id="install-dismiss" onclick="dismissInstall()">後で</button>
    <button onclick="doInstall()">追加する</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// データ（座標はadjust.htmlで調整済みの実ピクセル値）
// ══════════════════════════════════════════════════════
const PROVINCES = [
  { id:'heilongjiang', name:'黑龙江省',        py:'Hēilóngjiāng', type:'省',        cap:'哈尔滨',   capPy:'Hāěrbīn',      pop:31.5,  popRank:21, area:47.3,  areaRank:6,  capX:2311, capY:428  },
  { id:'jilin',        name:'吉林省',           py:'Jílín',        type:'省',        cap:'长春',     capPy:'Chángchūn',    pop:24.1,  popRank:22, area:18.7,  areaRank:15, capX:2283, capY:559  },
  { id:'liaoning',     name:'辽宁省',           py:'Liáoníng',     type:'省',        cap:'沈阳',     capPy:'Shěnyáng',     pop:42.6,  popRank:14, area:14.8,  areaRank:21, capX:2233, capY:723  },
  { id:'beijing',      name:'北京市',           py:'Běijīng',      type:'直轄市',    cap:'北京',     capPy:'Běijīng',      pop:21.5,  popRank:26, area:1.7,   areaRank:31, capX:1941, capY:821  },

// ══════════════════════════════════════════════════════
// 地図オーバーレイ：画像のnaturalサイズをviewBoxに使う
// ══════════════════════════════════════════════════════
let imgNW = 2411, imgNH = 2148; // 推定値（onload後に更新）

function setupOverlay(imgEl, svgEl) {
  function sync() {
    if (imgEl.naturalWidth) {
      imgNW = imgEl.naturalWidth;
      imgNH = imgEl.naturalHeight;
    }
    svgEl.setAttribute('viewBox', `0 0 ${imgNW} ${imgNH}`);
  }
  imgEl.addEventListener('load', sync);
  if (imgEl.complete && imgEl.naturalWidth) sync();
}

const mapImg     = document.getElementById('map-img');
const mapOverlay = document.getElementById('map-overlay');
const qMapImg    = document.getElementById('q-map-img');
const qMapOvl    = document.getElementById('q-map-overlay');
setupOverlay(mapImg,  mapOverlay);
setupOverlay(qMapImg, qMapOvl);

// ドットサイズ：画像幅の1.4%（最小12px）
function dotR() { return Math.max(12, imgNW * 0.014); }
function fontSize() { return Math.max(18, imgNW * 0.022); }

// ══════════════════════════════════════════════════════
// 通常モード
// ══════════════════════════════════════════════════════
let currentIdx = 0;
const synth = window.speechSynthesis;
let activeSpeakBtn = null;
let deferredPrompt = null;

function buildList() {
  const grid = document.getElementById('province-grid');
  PROVINCES.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'prov-btn';
    const short = p.name.replace(/省$|市$|特別行政区$|自治区$|壮族$|回族$|维吾尔$/, '').substring(0,4);
    btn.innerHTML = `<span class="pn">${short}</span><span class="pp">${p.py.split(' ')[0]}</span>`;
    btn.onclick = () => showDetail(i);
    grid.appendChild(btn);
  });
}

function showList() {
  stopSpeaking();
  document.getElementById('detail-view').style.display  = 'none';
  document.getElementById('quiz-view').style.display    = 'none';
  document.getElementById('list-view').style.display    = 'flex';
  document.getElementById('app-header').innerHTML = `
    <div class="header-flag">🇨🇳</div>
    <div><div class="header-title">中国の省</div>
    <div class="header-sub">全省・直轄市・自治区 — 発音学習</div></div>`;
}

function showDetail(idx) {
  stopSpeaking();
  currentIdx = idx;
  const p = PROVINCES[idx];
  document.getElementById('list-view').style.display   = 'none';
  document.getElementById('quiz-view').style.display   = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('app-header').innerHTML = `
    <button class="header-back" onclick="showList()">&#8592;</button>
    <div><div class="header-title" style="font-size:16px">${p.name}</div>
    <div class="header-sub">${p.py}</div></div>`;
  document.getElementById('d-name').textContent    = p.name;
  document.getElementById('d-type').textContent    = p.type;
  document.getElementById('d-py').textContent      = p.py;
  document.getElementById('d-cap').textContent     = p.cap;
  document.getElementById('d-cap-py').textContent  = p.capPy;
  document.getElementById('d-pop-rank').textContent = p.popRank + '位';
  document.getElementById('d-pop-val').textContent  = '人口 約' + p.pop + '百万人';
  document.getElementById('d-area-rank').textContent = p.areaRank + '位';
  document.getElementById('d-area-val').textContent  = '面積 約' + p.area + '万km²';
  requestAnimationFrame(() => {
    document.getElementById('d-pop-bar').style.width  = ((34-p.popRank)/33*100)+'%';
    document.getElementById('d-area-bar').style.width = ((34-p.areaRank)/33*100)+'%';
  });
  document.getElementById('detail-view').scrollTop = 0;
  drawDetailDot(p);
  setTimeout(() => speakBoth(), 600);
}

function drawDetailDot(p) {
  const r  = dotR();
  const fs = fontSize();
  mapOverlay.innerHTML = `
    <circle cx="${p.capX}" cy="${p.capY}" r="${r*2.2}" fill="none" stroke="#c0392b" stroke-width="${r*0.2}">
      <animate attributeName="r" values="${r};${r*3};${r}" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.0;0.8" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="${p.capX}" cy="${p.capY}" r="${r}" fill="#c0392b" stroke="#fff" stroke-width="${r*0.28}"/>
    <text x="${p.capX}" y="${p.capY - r - 5}" text-anchor="middle"
      font-size="${fs}" font-weight="700"
      fill="#c0392b" stroke="#fff" stroke-width="4" paint-order="stroke"
      font-family="'Noto Serif SC',serif">${p.cap}</text>`;
}

function nextRandom() {
  stopSpeaking();
  let n = currentIdx;
  while (n === currentIdx) n = Math.floor(Math.random() * PROVINCES.length);
  showDetail(n);
}

// ── Speech ──
function speakBoth() {
  if (!synth) return; stopSpeaking();
  const p  = PROVINCES[currentIdx];
  const pb = document.getElementById('speak-prov-btn');
  const cb = document.getElementById('speak-cap-btn');
  const u1 = new SpeechSynthesisUtterance(p.name);
  u1.lang='zh-CN'; u1.rate=0.82;
  u1.onstart = () => { activeSpeakBtn=pb; pb&&pb.classList.add('playing'); };
  u1.onend   = () => {
    pb&&pb.classList.remove('playing'); activeSpeakBtn=null;
    setTimeout(() => {
      const u2 = new SpeechSynthesisUtterance(p.cap);
      u2.lang='zh-CN'; u2.rate=0.82;
      u2.onstart = () => { activeSpeakBtn=cb; cb&&cb.classList.add('playing'); };
      u2.onend   = () => { cb&&cb.classList.remove('playing'); activeSpeakBtn=null; };
      u2.onerror = () => { cb&&cb.classList.remove('playing'); activeSpeakBtn=null; };
      synth.speak(u2);
    }, 800);
  };
  u1.onerror = () => { pb&&pb.classList.remove('playing'); activeSpeakBtn=null; };
  synth.speak(u1);
}

function speakOne(target) {
  if (!synth) return; stopSpeaking();
  const p   = PROVINCES[currentIdx];
  const text = target==='prov' ? p.name : p.cap;
  const btn  = document.getElementById(target==='prov' ? 'speak-prov-btn' : 'speak-cap-btn');
  const u = new SpeechSynthesisUtterance(text);
  u.lang='zh-CN'; u.rate=0.82;
  u.onstart = () => { activeSpeakBtn=btn; btn&&btn.classList.add('playing'); };
  u.onend   = () => { btn&&btn.classList.remove('playing'); activeSpeakBtn=null; };
  u.onerror = () => { btn&&btn.classList.remove('playing'); activeSpeakBtn=null; };
  synth.speak(u);
}

function stopSpeaking() {
  if (synth) synth.cancel();
  if (activeSpeakBtn) activeSpeakBtn.classList.remove('playing');
  activeSpeakBtn = null;
  document.querySelectorAll('.speak-icon-btn').forEach(b=>b.classList.remove('playing'));
}

// ══════════════════════════════════════════════════════
// クイズモード（単語帳方式）
// ══════════════════════════════════════════════════════
let quizQueue   = [];   // 出題ID配列（間違い分は末尾に追加）
let quizIdx     = 0;    // 現在のキュー位置
let wrongSet    = {};   // id → 間違い回数
let qCorrect    = 0;
let qWrong      = 0;

function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function startQuiz() {
  wrongSet = {}; qCorrect = 0; qWrong = 0;
  quizQueue = shuffle(PROVINCES.map(p => p.id));
  quizIdx = 0;
  _showQuizView();
  _nextQuestion();
}

function retryWrong() {
  const ids = Object.keys(wrongSet);
  if (!ids.length) { startQuiz(); return; }
  qCorrect = 0; qWrong = 0;
  quizQueue = shuffle([...ids]);
  wrongSet  = {};
  quizIdx   = 0;
  _showQuizView();
  _nextQuestion();
}

function _showQuizView() {
  stopSpeaking();
  document.getElementById('list-view').style.display   = 'none';
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('quiz-view').style.display   = 'flex';
  document.getElementById('quiz-finish').classList.remove('show');
  document.getElementById('quiz-nav').style.display    = 'flex';
  document.getElementById('app-header').innerHTML = `
    <button class="header-back" onclick="showList()">&#8592;</button>
    <div><div class="header-title" style="font-size:17px">🗺 クイズモード</div>
    <div class="header-sub">地図の赤点はどの省？</div></div>`;
}

function _nextQuestion() {
  if (quizIdx >= quizQueue.length) { _showFinish(); return; }
  const id = quizQueue[quizIdx];
  const p  = PROVINCES.find(x => x.id === id);
  if (!p) { quizIdx++; _nextQuestion(); return; }

  // 進捗
  const total = quizQueue.length;
  const pct   = (quizIdx / total) * 100;
  document.getElementById('q-progress-bar').style.width = pct + '%';
  document.getElementById('q-progress-text').textContent = `${quizIdx+1} / ${total}`;
  const wc = Object.keys(wrongSet).length;
  document.getElementById('q-wrong-label').textContent = wc ? `✗ 苦手: ${wc}省` : '';

  // 地図ドット（省都位置、ラベルなし）
  _drawQuizDot(p, false);

  // 答えリセット
  document.getElementById('q-reveal-btn').style.display = 'block';
  document.getElementById('q-answer-card').classList.remove('show');
  document.getElementById('quiz-view').scrollTop = 0;
}

function _drawQuizDot(p, showLabel) {
  const r  = dotR();
  const fs = fontSize();
  let html = `
    <circle cx="${p.capX}" cy="${p.capY}" r="${r*2.5}" fill="none" stroke="#c0392b" stroke-width="${r*0.22}">
      <animate attributeName="r" values="${r};${r*3.2};${r}" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="${p.capX}" cy="${p.capY}" r="${r}" fill="#c0392b" stroke="#fff" stroke-width="${r*0.3}"/>`;
  if (showLabel) {
    html += `<text x="${p.capX}" y="${p.capY - r - 5}" text-anchor="middle"
      font-size="${fs}" font-weight="700"
      fill="#c0392b" stroke="#fff" stroke-width="4" paint-order="stroke"
      font-family="'Noto Serif SC',serif">${p.name.replace(/省$|市$/,'')}</text>`;
  }
  qMapOvl.innerHTML = html;
}

function revealAnswer() {
  const id = quizQueue[quizIdx];
  const p  = PROVINCES.find(x => x.id === id);
  if (!p) return;
  document.getElementById('q-reveal-btn').style.display = 'none';
  document.getElementById('qa-name').textContent   = p.name;
  document.getElementById('qa-py').textContent     = p.py;
  document.getElementById('qa-type').textContent   = p.type;
  document.getElementById('qa-cap').textContent    = p.cap;
  document.getElementById('qa-cap-py').textContent = p.capPy;
  document.getElementById('q-answer-card').classList.add('show');
  // 答え表示後はラベルも地図に追加
  _drawQuizDot(p, true);
}

function judgeAnswer(correct) {
  const id = quizQueue[quizIdx];
  if (correct) {
    qCorrect++;
    // wrongSetの回数を減らす（0になれば削除）
    if (wrongSet[id]) { wrongSet[id]--; if (!wrongSet[id]) delete wrongSet[id]; }
  } else {
    qWrong++;
    wrongSet[id] = (wrongSet[id] || 0) + 1;
    // 間違い回数に応じてキュー末尾に追加（最大4回）
    const add = Math.min(wrongSet[id] + 2, 4);
    for (let i = 0; i < add; i++) quizQueue.push(id);
  }
  quizIdx++;
  _nextQuestion();
}

function _showFinish() {
  document.getElementById('quiz-finish').classList.add('show');
  document.getElementById('quiz-nav').style.display = 'none';
  document.getElementById('q-reveal-btn').style.display = 'none';
  document.getElementById('q-answer-card').classList.remove('show');
  document.getElementById('q-progress-bar').style.width = '100%';
  document.getElementById('q-progress-text').textContent = '完了！';
  document.getElementById('qf-correct').textContent = qCorrect;
  document.getElementById('qf-wrong').textContent   = qWrong;
  qMapOvl.innerHTML = '';
  const wc = Object.keys(wrongSet).length;
  if (wc === 0) {
    document.getElementById('qf-icon').textContent  = '🎉';
    document.getElementById('qf-title').textContent = '完璧！';
    document.getElementById('qf-sub').textContent   = `全問正解！素晴らしい！`;
    document.getElementById('qf-retry-wrong').style.display = 'none';
  } else {
    document.getElementById('qf-icon').textContent  = '📚';
    document.getElementById('qf-title').textContent = 'ラウンド終了';
    document.getElementById('qf-sub').textContent   = `まだ ${wc} 省が苦手です。\n「間違いのみ再挑戦」でもう一度！`;
    const btn = document.getElementById('qf-retry-wrong');
    btn.style.display = 'flex';
    btn.textContent   = `✗ 間違い ${wc} 省を再挑戦`;
  }
}

// ══════════════════════════════════════════════════════
// PWA
// ══════════════════════════════════════════════════════
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!localStorage.getItem('install-dismissed'))
    setTimeout(() => document.getElementById('install-bar').classList.add('show'), 2000);
});
function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt=null; dismissInstall(); });
}
function dismissInstall() {
  document.getElementById('install-bar').classList.remove('show');
  localStorage.setItem('install-dismissed','1');
}
window.addEventListener('appinstalled', () => dismissInstall());
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

buildList();
</script>
